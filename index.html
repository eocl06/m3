  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}html,body{width:100%;height:100%;overflow:hidden;touch-action:none;position:fixed;inset:0}body{font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(255,236,208,.36),transparent 28%),radial-gradient(circle at 85% 18%,rgba(255,220,170,.16),transparent 32%),linear-gradient(135deg,#bc8b5f,#8d603d 48%,#68452d);color:#2b1a11}.floorboards{position:absolute;inset:0;z-index:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 1px,transparent 1px 50px),repeating-linear-gradient(0deg,rgba(70,40,20,.12) 0 1px,transparent 1px 120px)}.rug{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-2deg);width:min(92vw,520px);height:min(78vh,720px);border-radius:36px;z-index:1;background:linear-gradient(135deg,#d9b37f,#b07b4d);box-shadow:0 28px 80px rgba(40,20,10,.18),inset 0 0 0 10px rgba(255,255,255,.08)}.bed{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(86vw,430px);height:min(72vh,620px);z-index:5}.bed-shadow{position:absolute;inset:16px 6px -12px;border-radius:34px;background:rgba(35,18,9,.22);filter:blur(18px)}.mattress{position:absolute;inset:0;border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,.16)),#ead8bd;box-shadow:0 18px 40px rgba(42,22,10,.22),inset 0 -16px 34px rgba(110,75,42,.12),inset 0 0 0 2px rgba(255,255,255,.35)}.sheet{position:absolute;inset:8% 6% 7%;border-radius:26px;background:repeating-linear-gradient(90deg,rgba(130,90,55,.035) 0 1px,transparent 1px 20px),repeating-linear-gradient(0deg,rgba(130,90,55,.035) 0 1px,transparent 1px 20px),#fff2df;box-shadow:inset 0 0 0 1px rgba(110,70,40,.08),inset 0 -10px 18px rgba(110,70,40,.08)}.pillow{position:absolute;left:50%;top:7%;transform:translateX(-50%);width:58%;height:16%;border-radius:24px;background:radial-gradient(circle at 45% 35%,rgba(255,255,255,.75),transparent 46%),#fff7e tate(2deg)}}.suitcase-shadow{position:absolute;inset:8% 4% -10%;border-radius:28px;background:rgba(25,14,7,.32);filter:blur(14px);transition:.45s ease}.closed-case{position:absolute;inset:0;border-radius:26px;background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 18% 82%,rgba(0,0,0,.08)),repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 2px,transparent 2px 24px),linear-gradient(135deg,#8c5a34,#4d2d18);border:3px solid #2e1a0f;box-shadow:0 14px 30px rgba(35,18,8,.34),inset 0 2px 0 rgba(255,255,255,.16),inset 0 -12px 20px rgba(0,0,0,.18);transition:.34s ease}.closed-case:before{content:'';position:absolute;left:50%;top:-15px;width:34%;height:26px;transform:translateX(-50%);border:7px solid #2e1a0f;border-bottom:0;border-radius:16px 16px 0 0}.closed-case:after{content:'';position:absolute;left:10%;right:10%;top:50%;height:2px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#25150d 0 7px,#cfa96f 7px 10px);opacity:.78;border-radius:999px}.corner-badge{position:absolute;top:14px;left:14px;width:18px;height:18px;border-radius:5px;background:rgba(255,255,255,.18)}.latch{position:absolute;top:45%;width:18px;height:18px;border-radius:6px;background:linear-gradient(180deg,#e0b971,#a37233);border:2px solid #2e1a0f;z-index:2}.latch.left{left:24%}.latch.right{right:24%}.zipper-pull{position:absolute;right:12%;top:48%;width:18px;height:13px;border-radius:6px;background:#d9b16e;border:2px solid #2e1a0f;transform:translateY(-50%) rotate(8deg);z-index:3}.wheel{position:absolute;bottom:-8px;width:16px;height:16px;border-radius:50%;background:#20130c;border:2px solid rgba(255,255,255,.14);z-index:-1}.wheel.w1{left:14%}.wheel.w2{right:14%}.tap-ring{position:absolute;inset:-8px;border-radius:34px;border:2px solid rgba(255,240,210,.58);animation:tapPulse 1.55s ease-in-out infinite;pointer-events:none}@keyframes tapPulse{0%,100%{opacity:.18;transform:scale(.985)}50%{opacity:.72;transform:scale(1.03)}}.open-case{position:absolute;inset:-10% -16%;opacity:0;pointer-events:none;transform:scale(.92);transition:opacity .42s ease .14s,transform .5s cubic-bezier(.2,.9,.18,1) .12s}.suitcase-wrap.open{top:69%;width:min(54vw,260px);height:min(22vh,155px);transform:translate(-50%,-50%) rotate(1deg) scale(.92);animation:none}.suitcase-wrap.open .closed-case{opacity:0;transform:scale(.82) translateY(-6px);filter:blur(2px);pointer-events:none}.suitcase-wrap.open .open-case{opacity:1;pointer-events:auto;transform:scale(1)}.suitcase-wrap.open .suitcase-shadow{opacity:.45;transform:scale(1.04)}.case-half{position:absolute;top:0;width:50%;height:100%;border-radius:22px;background:repeating-linear-gradient(0deg,rgba(60,35,18,.03) 0 2px,transparent 2px 18px),linear-gradient(135deg,#d1a56c,#996235);border:3px solid #2e1a0f;box-shadow:0 10px 24px rgba(35,18,8,.22),inset 0 0 0 8px rgba(76,42,22,.12),inset 0 -10px 18px rgba(0,0,0,.1)}.case-half.left{left:0;border-radius:24px 10px 10px 24px}.case-half.right{right:0;border-radius:10px 24px 24px 10px}.hinge-line{position:absolute;left:50%;top:7%;bottom:7%;width:7px;transform:translateX(-50%);background:repeating-linear-gradient(0deg,#2b190d 0 9px,#c89d57 9px 14px);border-radius:999px;z-index:3}.elastic{position:absolute;width:40%;height:9px;border-radius:999px;background:rgba(48,29,16,.35);z-index:4}.e1{left:6%;top:20%;transform:rotate(-17deg)}.e2{left:6%;bottom:20%;transform:rotate(17deg)}.e3{right:6%;top:20%;transform:rotate(17deg)}.e4{right:6%;bottom:20%;transform:rotate(-17deg)}.drop-zone{position:fixed;z-index:26;pointer-events:none;transform:translate(-50%,-50%);border:2px dashed rgba(127,83,45,.38);background:rgba(255,245,225,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.24);opacity:0;border-radius:22px;transition:opacity .25s ease,transform .25s ease}.drop-zone.active{opacity:1;animation:zonePulse 1.35s ease-in-out infinite}.drop-zone.soft{opacity:.3;animation:none}.zone-arrow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.4);box-shadow:0 4px 16px rgba(0,0,0,.08)}.zone-arrow:before{content:'';position:absolute;left:50%;top:47%;width:12px;height:12px;border-right:3px solid rgba(118,73,39,.9);border-bottom:3px solid rgba(118,73,39,.9);transform:translate(-50%,-50%) rotate(45deg)}@keyframes zonePulse{0%,100%{transform:translate(-50%,-50%) scale(.985);opacity:.45}50%{transform:translate(-50%,-50%) scale(1.03);opacity:.82}}.path-dot{position:fixed;width:6px;height:6px;border-radius:999px;background:rgba(126,82,43,.42);z-index:27;pointer-events:none;opacity:0}.path-dot.active{animation:dotFlow 1.7s ease-in-out infinite}.d2{animation-delay:.18s}.d3{animation-delay:.36s}@keyframes dotFlow{0%,100%{opacity:.04;transform:translate(-50%,-50%) scale(.65)}40%{opacity:.82;transform:translate(-50%,-50%) scale(1)}75%{opacity:.08;transform:translate(-50%,-50%) scale(.8)}}.item{position:fixed;z-index:40;pointer-events:auto;cursor:grab;touch-action:none;transform:translate(-50%,-50%) rotate(var(--rot));transition:left .35s cubic-bezier(.2,.9,.25,1),top .35s cubic-bezier(.2,.9,.25,1),transform .28s cubic-bezier(.2,.8,.2,1),opacity .24s ease}.item.nudge{animation:itemNudge 1.4s ease-in-out infinite}@keyframes itemNudge{0%,100%{transform:translate(-50%,-50%) rotate(var(--rot)) scale(1)}45%{transform:translate(-50%,-56%) rotate(var(--rot)) scale(1.05)}65%{transform:translate(-50%,-50%) rotate(var(--rot)) scale(1)}}.item.dragging{transition:none;cursor:grabbing;z-index:90;animation:none}.item.placed{cursor:default;z-index:45;animation:none}.item.pulse{animation:revealPulse 1.15s ease-in-out infinite}@keyframes revealPulse{0%,100%{transform:translate(-50%,-50%) rotate(var(--rot)) scale(1)}50%{transform:translate(-50%,-50%) rotate(var(--rot)) scale(1.08)}}.item svg{width:100%;height:100%;display:block;filter:drop-shadow(0 7px 8px rgba(32,17,8,.32));pointer-events:none}.item.envelope{z-index:58;cursor:pointer}.letter-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:200;padding:24px;background:radial-gradient(circle at center,rgba(70,43,20,.72),rgba(22,13,7,.96));backdrop-filter:blur(12px)}.letter-overlay.show{display:flex;animation:fadeIn .4s ease forwards}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.letter{width:min(88vw,370px);min-height:245px;padding:38px 30px 34px;border-radius:18px;position:relative;background:linear-gradient(180deg,rgba(255,255,255,.64),transparent 34%),#fff6e6;box-shadow:0 24px 70px rgba(0,0,0,.42),inset 0 0 0 1px rgba(104,65,33,.12);transform:scale(.62) translateY(22px) rotate(-1deg);opacity:0;animation:letterPop .72s cubic-bezier(.32,1.45,.45,1) .12s forwards;font-family:Caveat,cursive}.letter:before{content:'';position:absolute;inset:15px;border-radius:12px;border:1.5px dashed rgba(128,79,43,.28)}@keyframes letterPop{to{transform:scale(1) translateY(0) rotate(-1deg);opacity:1}}.letter-text{text-align:center;color:#3f2414;font-size:clamp(1.55rem,6vw,2rem);line-height:1.28;position:relative;z-index:2}.letter-line.small{margin-top:16px;font-size:clamp(1.2rem,4.6vw,1.5rem);color:#845131}.heart-mark{display:block;margin-top:14px;color:#c35b6f;font-size:1.9rem}.restart{position:absolute;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);border:0;border-radius:999px;padding:10px 16px;font-family:Inter,sans-serif;font-weight:700;font-size:13px;color:#fff7e8;background:rgba(255,255,255,.12);box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);backdrop-filter:blur(8px)}

<body>
  <div class="floorboards"></div><div class="rug"></div>
  <div class="room-item plant"><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div><div class="leaf l5"></div><div class="pot"></div></div>
  <div class="room-item nightstand"><div class="table"></div><div class="book"></div><div class="phone"></div></div>
  <div class="bed" id="bed"><div class="bed-shadow"></div><div class="mattress"></div><div class="sheet"></div><div class="pillow"></div></div>
  <div class="suitcase-wrap idle" id="suitcase" role="button" aria-label="Valizi aç"><div class="suitcase-shadow"></div><div class="closed-case"><div class="tap-ring"></div><div class="corner-badge"></div><div class="latch left"></div><div class="latch right"></div><div class="zipper-pull"></div><div class="wheel w1"></div><div class="wheel w2"></div></div><div class="open-case" id="openCase"><div class="case-half left"></div><div class="case-half right"></div><div class="hinge-line"></div><div class="elastic e1"></div><div class="elastic e2"></div><div class="elastic e3"></div><div class="elastic e4"></div></div></div>
  <div class="drop-zone" id="dropZone"><div class="zone-arrow"></div></div>
  <div class="path-dot d1" id="dot1"></div><div class="path-dot d2" id="dot2"></div><div class="path-dot d3" id="dot3"></div>
  <div class="letter-overlay" id="letterOverlay"><div class="letter"><div class="letter-text"><div class="letter-line">iyi yolculuklar</div><div class="letter-line small">seni özlemek de çok güzel</div><span class="heart-mark">♡</span></div></div><button class="restart" onclick="location.reload()">baştan oyna</button></div>
<script>
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
const bed=document.getElementById('bed'),suitcase=document.getElementById('suitcase'),openCase=document.getElementById('openCase'),dropZone=document.getElementById('dropZone'),letterOverlay=document.getElementById('letterOverlay'),dots=[document.getElementById('dot1'),document.getElementById('dot2'),document.getElementById('dot3')];
let audioCtx=null,phase='closed',placedCore=new Set(),bouquetPlaced=false;
function initAudio(){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;if(!audioCtx)audioCtx=new AC();if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});}
function tone(freq,dur,type='sine',vol=.04,at=0){if(!audioCtx)return;const now=audioCtx.currentTime+at,osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,now);gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(vol,now+.012);gain.gain.exponentialRampToValueAtTime(.0001,now+dur);osc.connect(gain);gain.connect(audioCtx.destination);osc.start(now);osc.stop(now+dur+.02)}
function paperRustle(){if(!audioCtx)return;const now=audioCtx.currentTime,len=audioCtx.sampleRate*.09,buffer=audioCtx.createBuffer(1,len,audioCtx.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len)*.33;const noise=audioCtx.createBufferSource(),filter=audioCtx.createBiquadFilter(),gain=audioCtx.createGain();noise.buffer=buffer;filter.type='bandpass';filter.frequency.value=1700;filter.Q.value=.9;gain.gain.setValueAtTime(.0001,now);gain.gain.exponentialRampToValueAtTime(.02,now+.01);gain.gain.exponentialRampToValueAtTime(.0001,now+.09);noise.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);noise.start(now);noise.stop(now+.1)}
function sound(type){if(!audioCtx)return;if(type==='open'){tone(659,.08,'triangle',.085,0);tone(880,.09,'triangle',.075,.06);tone(1175,.13,'sine',.06,.13);return}if(type==='grab'){tone(380,.05,'square',.02);return}if(type==='drop'){tone(392,.06,'triangle',.04);tone(523,.09,'sine',.03,.04);return}if(type==='reveal'){tone(523,.06,'triangle',.035);tone(784,.1,'sine',.028,.05);return}if(type==='letter'){paperRustle();tone(494,.09,'triangle',.03,.045);tone(659,.14,'sine',.026,.12)}}
function tshirtSVG(){return `<svg viewBox="0 0 100 100"><defs><linearGradient id="ts" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbfbfb"/><stop offset="100%" stop-color="#d8d8d8"/></linearGradient></defs><path d="M20 28 L36 18 L42 23 Q50 29 58 23 L64 18 L80 28 L75 43 L68 39 L68 84 Q68 89 63 89 L37 89 Q32 89 32 84 L32 39 L25 43 Z" fill="url(#ts)" stroke="#999" stroke-width="1.2"/><path d="M42 23 Q50 31 58 23" fill="none" stroke="#999" stroke-width="1.4"/></svg>`}
function jeansSVG(){return `<svg viewBox="0 0 100 100"><defs><linearGradient id="jn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6788b7"/><stop offset="100%" stop-color="#314c70"/></linearGradient></defs><path d="M26 16 L74 16 L72 50 L68 88 L55 88 L50 50 L45 88 L32 88 L28 50 Z" fill="url(#jn)" stroke="#20314c" stroke-width="1"/><rect x="26" y="16" width="48" height="8" rx="2" fill="#20314c" opacity=".45"/><line x1="50" y1="23" x2="50" y2="51" stroke="#20314c" stroke-width="1"/></svg>`}

function monkeySVG(){return `<svg viewBox="0 0 140 140"><defs><radialGradient id="fur" cx="50%" cy="35%" r="70%"><stop offset="0%" stop-color="#b95a2c"/><stop offset="100%" stop-color="#7d3217"/></radialGradient><linearGradient id="face" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4d9b6"/><stop offset="100%" stop-color="#dcb78e"/></linearGradient></defs><ellipse cx="48" cy="114" rx="14" ry="11" fill="#b45628"/><ellipse cx="91" cy="114" rx="14" ry="11" fill="#b45628"/><ellipse cx="48" cy="116" rx="10" ry="6" fill="#d9a878"/><ellipse cx="91" cy="116" rx="10" ry="6" fill="#d9a878"/><ellipse cx="70" cy="82" rx="30" ry="34" fill="url(#fur)"/><path d="M42 70 C20 76 14 93 22 104 C28 112 40 106 47 92" fill="none" stroke="#8f3a1b" stroke-width="16" stroke-linecap="round"/><path d="M98 70 C120 76 126 93 118 104 C112 112 100 106 93 92" fill="none" stroke="#8f3a1b" stroke-width="16" stroke-linecap="round"/><ellipse cx="24" cy="105" rx="9" ry="12" fill="#d7a373" transform="rotate(-10 24 105)"/><ellipse cx="116" cy="105" rx="9" ry="12" fill="#d7a373" transform="rotate(10 116 105)"/><ellipse cx="70" cy="40" rx="31" ry="32" fill="url(#fur)"/><ellipse cx="70" cy="47" rx="18" ry="17" fill="url(#face)"/><ellipse cx="70" cy="50" rx="11" ry="10" fill="#f6e3cb"/><ellipse cx="60" cy="40" rx="6.5" ry="8" fill="#fff"/><ellipse cx="80" cy="40" rx="6.5" ry="8" fill="#fff"/><ellipse cx="60" cy="41" rx="2.8" ry="3.6" fill="#2a180f"/><ellipse cx="80" cy="41" rx="2.8" ry="3.6" fill="#2a180f"/><circle cx="61" cy="39.8" r="1" fill="#fff"/><circle cx="81" cy="39.8" r="1" fill="#fff"/><ellipse cx="70" cy="49.5" rx="2.6" ry="1.9" fill="#7d4a2a"/><path d="M63 56 Q70 60 77 56" fill="none" stroke="#7d4a2a" stroke-width="2.2" stroke-linecap="round"/><path d="M57 67 L70 73 L83 67 L79 80 L70 75 L61 80 Z" fill="#bf5063"/><circle cx="70" cy="73" r="2.5" fill="#8d3346"/></svg>`}
function bouquetSVG(){return `<svg viewBox="0 0 140 140"><defs><linearGradient id="paperWrap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f7efe5"/><stop offset="100%" stop-color="#e4d3bf"/></linearGradient></defs><path d="M46 126 L68 83 L93 126 Z" fill="url(#paperWrap)" stroke="#b59b83" stroke-width="2"/><path d="M35 60 L68 86 L102 59" fill="none" stroke="#5f8b4d" stroke-width="4" stroke-linecap="round"/><path d="M46 57 L66 87" stroke="#5f8b4d" stroke-width="4" stroke-linecap="round"/><path d="M89 57 L70 86" stroke="#5f8b4d" stroke-width="4" stroke-linecap="round"/><circle cx="36" cy="55" r="13" fill="#f06b86"/><circle cx="58" cy="45" r="12" fill="#ff8fa2"/><circle cx="82" cy="44" r="12" fill="#ffd166"/><circle cx="103" cy="56" r="13" fill="#ef476f"/><circle cx="69" cy="32" r="13" fill="#ff6fae"/><circle cx="36" cy="55" r="4.5" fill="#ffd9e2"/><circle cx="58" cy="45" r="4.5" fill="#fff0f4"/><circle cx="82" cy="44" r="4.5" fill="#fff1bf"/><circle cx="103" cy="56" r="4.5" fill="#ffd4df"/><circle cx="69" cy="32" r="4.5" fill="#ffe0ef"/><path d="M59 92 L80 92 L73 108 L65 108 Z" fill="#d95c7b"/></svg>`}
function envelopeSVG(){return `<svg viewBox="0 0 100 72"><defs><linearGradient id="env" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fffaf0"/><stop offset="100%" stop-color="#ecd9bb"/></linearGradient></defs><rect x="6" y="12" width="88" height="50" rx="4" fill="url(#env)" stroke="#865434" stroke-width="1.4"/><path d="M7 14 L50 43 L93 14" fill="none" stroke="#865434" stroke-width="1.2"/><path d="M7 61 L39 36" fill="none" stroke="#865434" stroke-width="1" opacity=".75"/><path d="M93 61 L61 36" fill="none" stroke="#865434" stroke-width="1" opacity=".75"/><circle cx="50" cy="42" r="8" fill="#bd4c5f"/><text x="50" y="46" text-anchor="middle" font-family="serif" font-size="10" fill="#fff7e8">♡</text></svg>`}
const CORE_ITEMS=[{id:'tshirt',svg:tshirtSVG(),size:.20,startX:29,startY:37,rot:-10,placedRot:-12,stackX:-.26,stackY:-.18},{id:'jeans',svg:jeansSVG(),size:.21,startX:71,startY:36,rot:12,placedRot:10,stackX:.26,stackY:-.18},{id:'socks',svg:socksSVG(),size:.18,startX:30,startY:67,rot:8,placedRot:-6,stackX:-.26,stackY:.18},{id:'monkey',svg:monkeySVG(),size:.24,startX:70,startY:67,rot:-7,placedRot:6,stackX:.26,stackY:.18}],BOUQUET={id:'bouquet',svg:bouquetSVG(),size:.22,startX:50,startY:50,rot:-3,placedRot:-2,stackX:0,stackY:0},ENVELOPE={id:'envelope',svg:envelopeSVG(),size:.18,startX:50,startY:50,rot:-3},ALL=[...CORE_ITEMS,BOUQUET,ENVELOPE];
function bedRect(){return bed.getBoundingClientRect()}function caseRect(){return openCase.getBoundingClientRect()}function defById(id){return ALL.find(i=>i.id===id)}function itemEl(id){return document.querySelector(`.item[data-id="${id}"]`)}
function zoneData(){const r=bedRect(),w=Math.min(r.width*.46,210),h=Math.min(r.height*.24,150);return{x:r.left+r.width*.5,y:r.top+r.height*.40,w,h}}function positionDropZone(){const z=zoneData();dropZone.style.left=`${z.x}px`;dropZone.style.top=`${z.y}px`;dropZone.style.width=`${z.w}px`;dropZone.style.height=`${z.h}px`}function placedPosition(def){const z=zoneData();return{x:z.x+z.w*def.stackX,y:z.y+z.h*def.stackY}}function isInsideZone(x,y){const z=zoneData();return x>=z.x-z.w/2-16&&x<=z.x+z.w/2+16&&y>=z.y-z.h/2-16&&y<=z.y+z.h/2+16}
function positionInCase(el,def){const cr=caseRect(),br=bedRect(),size=Math.min(br.width,br.height)*def.size,x=cr.left+cr.width*def.startX/100,y=cr.top+cr.height*def.startY/100;el.style.width=`${size}px`;el.style.height=`${size}px`;el.style.left=`${x}px`;el.style.top=`${y}px`;el.dataset.baseX=x;el.dataset.baseY=y}function placeItemInZone(el,def){const p=placedPosition(def);el.classList.add('placed');el.classList.remove('nudge','pulse');el.style.left=`${p.x}px`;el.style.top=`${p.y}px`;el.style.transform=`translate(-50%,-50%) rotate(${def.placedRot}deg)`}
function buildVisibleItems(list){list.forEach(def=>{if(itemEl(def.id))return;const el=document.createElement('div');el.className='item nudge';el.dataset.id=def.id;el.style.setProperty('--rot',`${def.rot}deg`);el.innerHTML=def.svg;document.body.appendChild(el);positionInCase(el,def);attachDrag(el,def)})}
function revealSpecial(def,mode){if(itemEl(def.id))return;const el=document.createElement('div');el.className=`item ${mode==='envelope'?'envelope':''} pulse`;el.dataset.id=def.id;el.style.setProperty('--rot',`${def.rot}deg`);el.innerHTML=def.svg;document.body.appendChild(el);positionInCase(el,def);el.style.opacity='0';el.style.transform=`translate(-50%,-50%) rotate(${def.rot}deg) scale(.55)`;mode==='envelope'?attachEnvelope(el,def):attachDrag(el,def);sound('reveal');requestAnimationFrame(()=>{el.style.opacity='1';el.style.transform=`translate(-50%,-50%) rotate(${def.rot}deg) scale(1)`})}
function clearDots(){dots.forEach(d=>d.classList.remove('active'))}function getFirstLooseItem(){if(phase==='packing4'){for(const def of CORE_ITEMS){const el=itemEl(def.id);if(el&&!placedCore.has(def.id))return el}}if(phase==='bouquet')return itemEl('bouquet');return null}function showGuide(){clearDots();if(phase==='packing4'||phase==='bouquet'){dropZone.classList.remove('soft');dropZone.classList.add('active');const sample=getFirstLooseItem();if(!sample)return;const z=zoneData(),ix=parseFloat(sample.style.left),iy=parseFloat(sample.style.top);dots.forEach((dot,idx)=>{const t=(idx+1)/4;dot.style.left=`${ix+(z.x-ix)*t}px`;dot.style.top=`${iy+(z.y-iy)*t}px`;dot.classList.add('active')})}else{dropZone.classList.remove('active');dropZone.classList.add('soft')}}
function attachDrag(el,def){let dragging=false,startX=0,startY=0,itemX=0,itemY=0,pid=null;function down(e){if(el.classList.contains('placed'))return;if(phase==='envelope'||phase==='done')return;if(phase==='bouquet'&&def.id!=='bouquet')return;if(phase==='packing4'&&def.id==='bouquet')return;initAudio();e.preventDefault();pid=e.pointerId;try{el.setPointerCapture(pid)}catch(_){}dragging=true;el.classList.add('dragging');el.classList.remove('nudge','pulse');startX=e.clientX;startY=e.clientY;itemX=parseFloat(el.style.left);itemY=parseFloat(el.style.top);clearDots();dropZone.classList.add('active');sound('grab')}function move(e){if(!dragging)return;e.preventDefault();const dx=e.clientX-startX,dy=e.clientY-startY;el.style.left=`${itemX+dx}px`;el.style.top=`${itemY+dy}px`;const tilt=Math.max(-18,Math.min(18,dx*.12));el.style.transform=`translate(-50%,-50%) rotate(${def.rot+tilt}deg) scale(1.05)`}function up(){if(!dragging)return;dragging=false;el.classList.remove('dragging');try{el.releasePointerCapture(pid)}catch(_){}const x=parseFloat(el.style.left),y=parseFloat(el.style.top);if(isInsideZone(x,y))placeFlow(el,def);else{snapBack(el,def);setTimeout(showGuide,180)}}el.addEventListener('pointerdown',down);el.addEventListener('pointermove',move);el.addEventListener('pointerup',up);el.addEventListener('pointercancel',up)}
function attachEnvelope(el,def){el.addEventListener('pointerdown',e=>{if(phase!=='envelope')return;initAudio();e.preventDefault();sound('letter');el.classList.remove('pulse');el.style.opacity='.15';el.style.transform=`translate(-50%,-50%) rotate(${def.rot}deg) scale(1.35)`;setTimeout(()=>{letterOverlay.classList.add('show');phase='done'},220)})}function snapBack(el,def){el.style.left=`${el.dataset.baseX}px`;el.style.top=`${el.dataset.baseY}px`;el.style.transform=`translate(-50%,-50%) rotate(${def.rot}deg)`;if(!el.classList.contains('placed'))el.classList.add(def.id==='envelope'?'pulse':'nudge')}
function placeFlow(el,def){sound('drop');placeItemInZone(el,def);if(phase==='packing4'){placedCore.add(def.id);if(placedCore.size===4){phase='bouquet';setTimeout(()=>{revealSpecial(BOUQUET,'bouquet');showGuide()},380)}else setTimeout(showGuide,160);return}if(phase==='bouquet'&&def.id==='bouquet'){bouquetPlaced=true;phase='envelope';setTimeout(()=>{revealSpecial(ENVELOPE,'envelope');dropZone.classList.remove('active');dropZone.classList.add('soft');clearDots()},380)}}
function openSuitcase(){phase='packing4';suitcase.classList.remove('idle');suitcase.classList.add('open');positionDropZone();setTimeout(()=>{buildVisibleItems(CORE_ITEMS);dropZone.classList.add('active');showGuide()},320)}
suitcase.addEventListener('pointerdown',e=>{if(phase!=='closed')return;e.preventDefault();initAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().then(()=>sound('open')).catch(()=>{});else sound('open');if(navigator.vibrate)navigator.vibrate(18);openSuitcase()});
function relayout(){positionDropZone();document.querySelectorAll('.item').forEach(el=>{const def=defById(el.dataset.id);if(!def||phase==='closed')return;if(el.classList.contains('placed')){const p=placedPosition(def);el.style.left=`${p.x}px`;el.style.top=`${p.y}px`;return}if(el.dataset.id==='envelope'&&phase==='envelope'){positionInCase(el,def);return}if(el.dataset.id==='bouquet'&&phase!=='closed'&&!bouquetPlaced){positionInCase(el,def);return}if(CORE_ITEMS.find(i=>i.id===el.dataset.id)&&!placedCore.has(el.dataset.id))positionInCase(el,def)});if(phase!=='closed'&&phase!=='done')showGuide()}window.addEventListener('resize',()=>setTimeout(relayout,100));
</script>
